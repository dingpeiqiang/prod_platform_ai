# ============================================================
# AI驱动动态表单 - 生产环境部署
# ============================================================
# 启动命令: docker-compose up -d --build
# 停止命令: docker-compose down
# 查看日志: docker-compose logs -f [service]
# ============================================================

services:
  # -------------------- 后端服务 --------------------
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: ai-form-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-6173}:6173"
    volumes:
      # 挂载配置文件（只读）
      - ../backend/config:/app/config:ro
      # 持久化数据库文件
      - backend-data:/app/backend
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./backend/form.db
    networks:
      - ai-form-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6173/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------- 前端服务 --------------------
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:6173}
    container_name: ai-form-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-form-network

networks:
  ai-form-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
